<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#38b653" />
    <title>Association Careers - Find Your Next Opportunity</title>
    <meta name="description" content="Browse open positions at realtor associations across the United States. Find CEO, marketing, communications, government affairs, and more association careers." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://associationcareers.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Association Careers" />
    <meta property="og:title" content="Association Careers - Find Your Next Opportunity" />
    <meta property="og:description" content="Browse open positions at realtor associations across the United States. Find CEO, marketing, communications, government affairs, and more association careers." />
    <meta property="og:url" content="https://associationcareers.com" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Association Careers - Find Your Next Opportunity" />
    <meta name="twitter:description" content="Browse open positions at realtor associations across the United States." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Association Careers",
      "url": "https://associationcareers.com",
      "description": "Job board for realtor association professionals across the United States",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://associationcareers.com/map?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
